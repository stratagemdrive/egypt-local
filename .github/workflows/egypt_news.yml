name: Egypt News RSS Aggregator

on:
  schedule:
    # 6AM EST = 11:00 UTC, 6PM EST = 23:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news aggregator
        run: python fetch_egypt_news.py

      - name: Commit and push egypt_news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/egypt_news.json
          git diff --cached --quiet || git commit -m "chore: update egypt_news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
